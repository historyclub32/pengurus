<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Formulir - Admin HC 32</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/3.5.0/remixicon.css" rel="stylesheet">
    
    <script src="../config.js"></script>
    <script src="../components.js"></script>

    <style>
        :root { 
            --hc-blue: #1a4787; 
            --hc-toska: #0f8a94; 
            --hc-dark: #1e293b; 
            --hc-bg: #f8fafc; 
            --hc-border: #e2e8f0; 
            --hc-green: #10b981; 
            --hc-red: #ef4444; 
        }
        
        main { padding: 32px; margin-left: 260px; min-height: 100vh; transition: margin-left 0.3s; }
        .dashboard-wrapper { max-width: 1000px; margin: 0 auto; width: 100%; }
        
        @media (max-width: 900px) { main { margin-left: 0; padding: 20px 15px; } }

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .page-title { font-size: 24px; font-weight: 700; color: var(--hc-dark); margin: 0; }
        .page-subtitle { font-size: 14px; color: #64748b; margin-top: 4px; }

        .btn-primary {
            background: linear-gradient(135deg, var(--hc-blue), var(--hc-toska));
            color: white; border: none; padding: 10px 20px; border-radius: 8px;
            font-weight: 600; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 10px rgba(26, 71, 135, 0.2); transition: 0.2s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(26, 71, 135, 0.3); }

        /* Modal Box Styling */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-overlay.active { display: flex; }
        .modal-card { background: white; width: 90%; max-width: 500px; border-radius: 16px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--hc-border); padding-bottom: 15px; }
        .modal-title { font-size: 18px; font-weight: 700; color: var(--hc-dark); margin: 0; }
        .btn-close { background: none; border: none; font-size: 24px; color: #64748b; cursor: pointer; }

        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--hc-dark); margin-bottom: 6px; }
        .form-input, .form-select { width: 100%; padding: 10px 14px; border: 1px solid var(--hc-border); border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 14px; box-sizing: border-box; }
        .form-input:focus, .form-select:focus { outline: none; border-color: var(--hc-blue); box-shadow: 0 0 0 3px rgba(26, 71, 135, 0.1); }
        
        /* Checkbox Grid (Untuk Metode Pembayaran) */
        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #475569; }
        
        #payment-settings { display: none; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid var(--hc-border); margin-top: 10px; }

        .card-table-container { background: white; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; }
    </style>
</head>
<body>

    <main>
        <div class="dashboard-wrapper">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Manajemen Formulir</h1>
                    <p class="page-subtitle">Atur formulir pembayaran, survei, dan pendataan HC 32.</p>
                </div>
                <button class="btn-primary" onclick="openFormModal()"><i class="ri-add-line"></i> Buat Form Baru</button>
            </div>

            <div id="form-list-container" class="card-table-container">
                <p style="text-align:center; padding: 20px; color: #94a3b8;">Memuat daftar formulir...</p>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="form-modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 class="modal-title">Pengaturan Formulir</h3>
                <button class="btn-close" onclick="closeFormModal()"><i class="ri-close-line"></i></button>
            </div>

            <form id="create-form">
                <div class="form-group">
                    <label class="form-label">Kategori Form</label>
                    <select id="inp-kategori" class="form-select" onchange="togglePaymentSettings()" required>
                        <option value="Pembayaran">Pembayaran (Kas / Event)</option>
                        <option value="Survei">Survei / Kuisioner</option>
                        <option value="Pendataan">Pendataan / Registrasi</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Kode Form (URL Parameter)</label>
                    <input type="text" id="inp-kode" class="form-input" placeholder="Contoh: HALAL2026 (Tanpa Spasi)" required style="text-transform: uppercase;">
                    <p style="font-size: 11px; color: #94a3b8; margin-top: 4px;">URL: .../form/pembayaran/?kode=<span id="preview-kode" style="font-weight:bold; color:var(--hc-blue);">HALAL2026</span></p>
                </div>

                <div class="form-group">
                    <label class="form-label">Judul Form</label>
                    <input type="text" id="inp-judul" class="form-input" placeholder="Contoh: Halal Bihalal HC 2026" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Deskripsi / Petunjuk Pengisian</label>
                    <textarea id="inp-desc" class="form-input" rows="3" placeholder="Contoh: Silakan isi form pembayaran berikut..." required></textarea>
                </div>

                <div id="payment-settings">
                    <label class="form-label">Metode Pembayaran Tersedia</label>
                    <div class="checkbox-grid">
                        <label class="checkbox-item"><input type="checkbox" name="metode" value="QRIS" checked> QRIS</label>
                        <label class="checkbox-item"><input type="checkbox" name="metode" value="TUNAI" checked> Tunai (Langsung)</label>
                        <label class="checkbox-item"><input type="checkbox" name="metode" value="BANK" checked> Transfer Bank</label>
                        <label class="checkbox-item"><input type="checkbox" name="metode" value="E-WALLET" checked> E-Wallet</label>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 15px;">
                    <label class="form-label">Status Form</label>
                    <select id="inp-status" class="form-select">
                        <option value="Aktif">Aktif (Bisa diisi)</option>
                        <option value="Ditutup">Ditutup (Tidak bisa diisi)</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">Simpan Form</button>
            </form>
        </div>
    </div>

    <script>
        let ADMIN_TOKEN = null;
        let CACHED_FORMS = []; // Menyimpan data sementara agar edit lebih cepat

        document.addEventListener('DOMContentLoaded', () => {
            initHC32AdminNavigation('formulir');
            
            const token = localStorage.getItem('hc32_token') || new URLSearchParams(window.location.search).get('token');
            if(!token) {
                window.location.href = "../../keanggotaan/login pengurus/index.html";
                return;
            }
            ADMIN_TOKEN = token;
            loadFormList();
        });

        // --- FUNGSI AMBIL LIST FORM ---
        async function loadFormList() {
            const container = document.getElementById('form-list-container');
            try {
                const res = await hc32_post('listAllForms', { token: ADMIN_TOKEN });
                if (res.status === 'ok') {
                    CACHED_FORMS = res.data; // Simpan ke cache
                    renderTable(res.data);
                }
            } catch (e) {
                container.innerHTML = `<p style="color:red; text-align:center;">Gagal memuat data.</p>`;
            }
        }

        function renderTable(data) {
            const container = document.getElementById('form-list-container');
            if (data.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:40px; color:#94a3b8;">Belum ada formulir.</div>`;
                return;
            }

            let html = `
                <table style="width:100%; border-collapse: collapse; font-size: 13px;">
                    <thead>
                        <tr style="text-align:left; border-bottom: 2px solid #f1f5f9; color:#64748b;">
                            <th style="padding:12px;">JUDUL / KODE</th>
                            <th style="padding:12px;">KATEGORI</th>
                            <th style="padding:12px;">STATUS</th>
                            <th style="padding:12px;">AKSI</th>
                        </tr>
                    </thead>
                    <tbody>`;

            data.forEach(f => {
                const badgeColor = f.status === 'Aktif' ? 'var(--hc-green)' : 'var(--hc-red)';
                const link = `../../../form/${f.kategori.toLowerCase()}/?kode=${f.kode}`;
                
                html += `
                    <tr style="border-bottom: 1px solid #f1f5f9;">
                        <td style="padding:12px;">
                            <div style="font-weight:700; color:var(--hc-blue);">${f.judul}</div>
                            <div style="font-size:11px; color:#94a3b8;">ID: ${f.kode}</div>
                        </td>
                        <td style="padding:12px;">${f.kategori}</td>
                        <td style="padding:12px;"><span style="color:${badgeColor}; font-weight:700;">● ${f.status}</span></td>
                        <td style="padding:12px; display:flex; gap:10px;">
                            <a href="${link}" target="_blank" title="Buka Form" style="color:var(--hc-toska);"><i class="ri-external-link-line"></i></a>
                            <button onclick="editForm('${f.kode}')" title="Edit" style="background:none; border:none; color:var(--hc-blue); cursor:pointer;"><i class="ri-edit-line"></i></button>
                            <button onclick="deleteForm('${f.kode}')" title="Hapus" style="background:none; border:none; color:var(--hc-red); cursor:pointer;"><i class="ri-delete-bin-line"></i></button>
                        </td>
                    </tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        // --- FUNGSI EDIT ---
        function editForm(kode) {
            const form = CACHED_FORMS.find(f => f.kode === kode);
            if (!form) return;

            // Isi Modal dengan data lama
            document.getElementById('inp-kode').value = form.kode;
            document.getElementById('inp-kode').disabled = true; // Kode tidak boleh diganti saat edit
            document.getElementById('preview-kode').innerText = form.kode;
            
            document.getElementById('inp-kategori').value = form.kategori;
            document.getElementById('inp-judul').value = form.judul;
            document.getElementById('inp-desc').value = form.deskripsi;
            document.getElementById('inp-status').value = form.status;

            // Centang metode pembayaran
            const metodeArray = form.metode.split(',').map(m => m.trim());
            document.querySelectorAll('input[name="metode"]').forEach(cb => {
                cb.checked = metodeArray.includes(cb.value);
            });

            togglePaymentSettings();
            openFormModal();
        }

        // --- FUNGSI HAPUS ---
        async function deleteForm(kode) {
            if (!confirm(`Apakah Anda yakin ingin menghapus formulir [${kode}]? Semua akses ke link form ini akan hilang.`)) return;

            window.showHC32Status('loading', 'Menghapus...', 'Sedang menghapus formulir dari database.');

            try {
                const res = await hc32_post('deleteFormConfig', { token: ADMIN_TOKEN, kode: kode });
                if (res.status === 'ok') {
                    window.showHC32Status('success', 'Berhasil', res.message);
                    loadFormList(); // Refresh tabel
                } else {
                    window.showHC32Status('error', 'Gagal', res.message);
                }
            } catch (err) {
                window.showHC32Status('error', 'Error', 'Terjadi kesalahan koneksi.');
            }
        }

        // --- MODAL & TOGGLE ---
        function openFormModal() { 
            document.getElementById('form-modal').classList.add('active'); 
        }

        function closeFormModal() { 
            document.getElementById('form-modal').classList.remove('active'); 
            document.getElementById('create-form').reset(); 
            document.getElementById('inp-kode').disabled = false; // Aktifkan kembali untuk form baru
            togglePaymentSettings(); 
        }

        function togglePaymentSettings() {
            const kat = document.getElementById('inp-kategori').value;
            document.getElementById('payment-settings').style.display = (kat === 'Pembayaran') ? 'block' : 'none';
        }

        // Event update preview kode
        document.getElementById('inp-kode').addEventListener('input', function(e) {
            this.value = this.value.toUpperCase().replace(/\s+/g, '');
            document.getElementById('preview-kode').innerText = this.value || '...';
        });

        // --- SUBMIT SAVE (Handle Tambah & Update) ---
        document.getElementById('create-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            let metodeTerpilih = [];
            document.querySelectorAll('input[name="metode"]:checked').forEach(cb => metodeTerpilih.push(cb.value));

            const payload = {
                action: 'saveFormConfig',
                token: ADMIN_TOKEN,
                kode: document.getElementById('inp-kode').value,
                kategori: document.getElementById('inp-kategori').value,
                judul: document.getElementById('inp-judul').value,
                deskripsi: document.getElementById('inp-desc').value,
                metode: metodeTerpilih,
                status: document.getElementById('inp-status').value
            };

            window.showHC32Status('loading', 'Menyimpan...', 'Sedang memproses data.');

            try {
                const res = await hc32_post('saveFormConfig', payload);
                if (res.status === 'ok') {
                    window.showHC32Status('success', 'Berhasil', res.message);
                    closeFormModal();
                    loadFormList(); // Refresh tabel
                } else {
                    window.showHC32Status('error', 'Gagal', res.message);
                }
            } catch (err) {
                window.showHC32Status('error', 'Koneksi Gagal', err.message);
            }
        });
    </script>
</body>
</html>
